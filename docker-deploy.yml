version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ai_video_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ai_video_platform
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: ai_video_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_video_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:root_password@mysql:3306/ai_video_platform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=change-this-in-production
    depends_on:
      - mysql
      - redis
    volumes:
      - ./backend/.env:/app/.env

volumes:
  mysql_data:
  redis_data: